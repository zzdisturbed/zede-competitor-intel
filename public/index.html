<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEDE Paris Competitor Ad Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas: #f7f1e7;
        --paper: rgba(255, 252, 246, 0.82);
        --paper-strong: #fffaf1;
        --ink: #1a1714;
        --muted: #60584f;
        --line: rgba(48, 39, 31, 0.14);
        --green: #20653a;
        --green-soft: rgba(32, 101, 58, 0.12);
        --gray: #5f646a;
        --gray-soft: rgba(95, 100, 106, 0.12);
        --accent: #b56b38;
        --accent-soft: rgba(181, 107, 56, 0.12);
        --shadow: 0 24px 60px rgba(37, 24, 8, 0.1);
        --radius-lg: 28px;
        --radius-md: 18px;
        --radius-sm: 999px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(181, 107, 56, 0.16), transparent 34%),
          radial-gradient(circle at top right, rgba(32, 101, 58, 0.12), transparent 28%),
          linear-gradient(180deg, #f8f4ed 0%, #f1e7d9 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(26, 23, 20, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(26, 23, 20, 0.03) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 85%);
      }

      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .hero {
        display: grid;
        gap: 18px;
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: linear-gradient(135deg, rgba(255, 250, 241, 0.96), rgba(244, 235, 219, 0.84));
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        width: fit-content;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 4rem);
        line-height: 0.98;
      }

      .hero-copy {
        margin: 0;
        max-width: 62ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .meta {
        color: var(--muted);
        font-size: 0.92rem;
      }

      button {
        border: 0;
        border-radius: var(--radius-sm);
        padding: 12px 18px;
        background: var(--ink);
        color: #fffaf1;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, opacity 120ms ease;
      }

      button:hover,
      button:focus-visible {
        opacity: 0.92;
        transform: translateY(-1px);
      }

      button:focus-visible {
        outline: 3px solid rgba(32, 101, 58, 0.28);
        outline-offset: 3px;
      }

      main {
        display: grid;
        gap: 18px;
        margin-top: 24px;
      }

      .empty,
      .error,
      .competitor-card {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--paper);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .empty,
      .error {
        padding: 28px;
      }

      .error {
        color: #7c2616;
        background: rgba(255, 243, 239, 0.9);
      }

      .competitor-card {
        overflow: hidden;
      }

      .competitor-top {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        align-items: flex-start;
        justify-content: space-between;
        padding: 24px 24px 16px;
        background:
          linear-gradient(180deg, rgba(255, 252, 246, 0.92), rgba(255, 252, 246, 0.56)),
          radial-gradient(circle at right top, rgba(181, 107, 56, 0.14), transparent 40%);
      }

      .competitor-heading h2 {
        margin: 0 0 8px;
        font-size: clamp(1.4rem, 2vw, 2rem);
      }

      .competitor-heading p {
        margin: 0;
        color: var(--muted);
      }

      .metric-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .metric-pill {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--paper-strong);
        font-size: 0.9rem;
      }

      .metric-pill strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .filter-panel {
        display: grid;
        gap: 16px;
        padding: 22px 24px;
      }

      .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .filter-group {
        display: grid;
        gap: 8px;
      }

      .filter-group span {
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      select {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--paper-strong);
        color: var(--ink);
        font: inherit;
      }

      .analysis-section {
        display: grid;
        gap: 14px;
      }

      .analysis-head {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: baseline;
        justify-content: space-between;
      }

      .analysis-head h2 {
        margin: 0;
        font-size: clamp(1.25rem, 1.8vw, 1.8rem);
      }

      .analysis-head p {
        margin: 0;
        color: var(--muted);
      }

      .analysis-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 14px;
      }

      .analysis-card {
        display: grid;
        gap: 10px;
        min-height: 190px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: linear-gradient(180deg, rgba(255, 252, 246, 0.96), rgba(255, 248, 238, 0.88));
      }

      .analysis-card h3 {
        margin: 0;
        font-size: 1.05rem;
      }

      .analysis-label,
      .analysis-id {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .analysis-days {
        font-size: 1.9rem;
        font-weight: 700;
      }

      .analysis-copy {
        color: var(--muted);
        line-height: 1.55;
      }

      .analysis-copy.empty-copy {
        font-style: italic;
      }

      .ad-thumbnail {
        display: block;
        width: 120px;
        max-width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 252, 246, 0.88);
      }

      .meta-link {
        width: fit-content;
        color: var(--muted);
        font-size: 0.8rem;
        text-decoration: none;
        opacity: 0.86;
      }

      .meta-link:hover,
      .meta-link:focus-visible {
        opacity: 1;
        text-decoration: underline;
      }

      .tag-row,
      .theme-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: rgba(255, 252, 246, 0.96);
        color: var(--muted);
        font-size: 0.82rem;
      }

      .group-stack {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .group-label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .winner-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 14px;
        padding: 0 24px 24px;
      }

      .winner {
        display: grid;
        gap: 12px;
        padding: 18px;
        min-height: 190px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: rgba(255, 252, 246, 0.92);
      }

      .winner-head,
      .winner-foot {
        display: flex;
        gap: 10px;
        justify-content: space-between;
        align-items: center;
      }

      .winner-id {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .badge {
        width: fit-content;
        padding: 7px 10px;
        border-radius: var(--radius-sm);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .badge.active {
        background: var(--green-soft);
        color: var(--green);
      }

      .badge.inactive {
        background: var(--gray-soft);
        color: var(--gray);
      }

      .days {
        font-size: 1.7rem;
        font-weight: 700;
      }

      .copy {
        color: var(--muted);
        line-height: 1.55;
      }

      .copy.empty-copy {
        font-style: italic;
      }

      .detail {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .winner-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 20px, 1240px);
          padding-top: 20px;
        }

        .hero,
        .filter-panel,
        .competitor-top,
        .winner-list {
          padding-left: 18px;
          padding-right: 18px;
        }

        .winner-list {
          padding-bottom: 18px;
        }
      }
    </style>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="eyebrow">ZEDE Paris</div>
        <div>
          <h1>Competitor Ad Intelligence</h1>
          <p class="hero-copy">
            Meta Ad Library winners by competitor, ranked by run duration. Use this to spot the ads that kept spending the longest and the formats that each brand leans on most.
          </p>
        </div>
        <div class="hero-actions">
          <div id="generatedAt" class="meta">Loading latest scrape summary…</div>
          <button id="refreshButton" type="button">Refresh Dashboard</button>
        </div>
      </header>

      <main id="app" aria-live="polite"></main>
    </div>

    <script>
      const generatedAtEl = document.getElementById("generatedAt");
      const appEl = document.getElementById("app");
      const refreshButton = document.getElementById("refreshButton");
      const filterState = {
        offerAngle: "all",
        messagingTheme: "all"
      };
      let latestPayload = null;

      function truncate(value, limit = 100) {
        if (!value) {
          return "";
        }

        if (value.length <= limit) {
          return value;
        }

        return `${value.slice(0, limit - 1).trimEnd()}…`;
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (character) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          };
          return entities[character];
        });
      }

      function formatTimestamp(value) {
        if (!value) {
          return "n/a";
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return new Intl.DateTimeFormat("en-GB", {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(date);
      }

      function formatDateRange(ad) {
        if (ad.start_date && ad.end_date) {
          return `${ad.start_date} → ${ad.end_date}`;
        }

        if (ad.start_date && !ad.end_date) {
          return `${ad.start_date} → running`;
        }

        return "Date unavailable";
      }

      function renderThumbnail(ad, altText) {
        const thumbnailUrl = String(ad?.thumbnail_url || "").trim();
        if (!thumbnailUrl) {
          return "";
        }

        return `<img class="ad-thumbnail" src="${escapeHtml(thumbnailUrl)}" alt="${escapeHtml(altText)}" loading="lazy" />`;
      }

      function renderMetaLink(ad) {
        const libraryId = String(ad?.library_id || "").trim();
        if (!libraryId) {
          return "";
        }

        const url = `https://www.facebook.com/ads/library/?id=${encodeURIComponent(libraryId)}`;
        return `<a class="meta-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">View on Meta →</a>`;
      }

      function renderEmpty(message, className = "empty") {
        appEl.innerHTML = `<section class="${className}">${message}</section>`;
      }

      function themeOptions(competitors) {
        return [...new Set(
          competitors.flatMap((competitor) =>
            (competitor.messaging_theme_breakdown || []).map((entry) => entry.label)
          )
        )].sort((left, right) => left.localeCompare(right));
      }

      function angleOptions(competitors) {
        return [...new Set(
          competitors.flatMap((competitor) =>
            (competitor.offer_angle_breakdown || []).map((entry) => entry.label)
          )
        )].sort((left, right) => left.localeCompare(right));
      }

      function hasActiveFilters() {
        return filterState.offerAngle !== "all" || filterState.messagingTheme !== "all";
      }

      function matchesFilters(ad) {
        if (!ad) {
          return false;
        }

        if (filterState.offerAngle !== "all" && ad.offer_angle !== filterState.offerAngle) {
          return false;
        }

        if (filterState.messagingTheme !== "all" && ad.messaging_theme !== filterState.messagingTheme) {
          return false;
        }

        return true;
      }

      function renderTagChips(items, emptyLabel) {
        if (!items || items.length === 0) {
          return `<span class="tag-chip">${escapeHtml(emptyLabel)}</span>`;
        }

        return items
          .map((item) => `<span class="tag-chip">${escapeHtml(item.label)} · ${escapeHtml(item.count)}</span>`)
          .join("");
      }

      function renderRecentThemes(items) {
        if (!items || items.length === 0) {
          return `<span class="tag-chip">No themes tagged yet</span>`;
        }

        return items
          .map(
            (item) =>
              `<span class="tag-chip">${escapeHtml(item.start_date || "n/a")} · ${escapeHtml(item.messaging_theme)}</span>`
          )
          .join("");
      }

      function renderFilterPanel(competitors) {
        const offerAngleOptions = angleOptions(competitors);
        const messagingThemeOptions = themeOptions(competitors);

        return `
          <section class="competitor-card filter-panel">
            <div class="analysis-head">
              <div>
                <h2>AI Message Filters</h2>
                <p>Filter active winners and winner lists by offer angle or messaging theme.</p>
              </div>
            </div>
            <div class="filter-grid">
              <label class="filter-group">
                <span>Offer angle</span>
                <select id="offerAngleFilter">
                  <option value="all">All angles</option>
                  ${offerAngleOptions
                    .map(
                      (option) =>
                        `<option value="${escapeHtml(option)}"${filterState.offerAngle === option ? " selected" : ""}>${escapeHtml(option)}</option>`
                    )
                    .join("")}
                </select>
              </label>
              <label class="filter-group">
                <span>Messaging theme</span>
                <select id="messagingThemeFilter">
                  <option value="all">All themes</option>
                  ${messagingThemeOptions
                    .map(
                      (option) =>
                        `<option value="${escapeHtml(option)}"${filterState.messagingTheme === option ? " selected" : ""}>${escapeHtml(option)}</option>`
                    )
                    .join("")}
                </select>
              </label>
            </div>
          </section>
        `;
      }

      function bindFilters() {
        const offerAngleFilter = document.getElementById("offerAngleFilter");
        const messagingThemeFilter = document.getElementById("messagingThemeFilter");

        if (offerAngleFilter) {
          offerAngleFilter.addEventListener("change", (event) => {
            filterState.offerAngle = event.target.value;
            renderSummary(latestPayload);
          });
        }

        if (messagingThemeFilter) {
          messagingThemeFilter.addEventListener("change", (event) => {
            filterState.messagingTheme = event.target.value;
            renderSummary(latestPayload);
          });
        }
      }

      function renderAnalysisSection(competitors) {
        const cards = competitors
          .map((competitor) => {
            const winner = competitor.current_winner;
            const visibleWinner = matchesFilters(winner) ? winner : null;
            const copy = truncate(visibleWinner?.ad_copy_text || visibleWinner?.ad_copy, 100);
            const hasCopy = Boolean(copy);
            const emptyMessage = hasActiveFilters()
              ? "No active ad matches the current filters."
              : "No active ads in the latest scrape.";

            if (!visibleWinner) {
              return `
                <article class="analysis-card">
                  <div>
                    <h3>${escapeHtml(competitor.competitor)}</h3>
                    <div class="analysis-label">Current winner</div>
                  </div>
                  <div class="analysis-days">—</div>
                  <div class="analysis-copy empty-copy">${emptyMessage}</div>
                </article>
              `;
            }

            return `
              <article class="analysis-card">
                <div>
                  <h3>${escapeHtml(competitor.competitor)}</h3>
                  <div class="analysis-label">Current winner</div>
                </div>
                <div class="winner-head">
                  <span class="badge active">Active</span>
                  <span class="analysis-id">Library ID ${escapeHtml(visibleWinner.library_id || "n/a")}</span>
                </div>
                <div class="analysis-days">${visibleWinner.run_days ?? "?"} days</div>
                ${renderThumbnail(visibleWinner, `${competitor.competitor} ad thumbnail`)}
                <div class="analysis-copy ${hasCopy ? "" : "empty-copy"}">${hasCopy ? escapeHtml(copy) : "No primary copy captured."}</div>
                ${renderMetaLink(visibleWinner)}
                <div class="tag-row">
                  <span class="tag-chip">${escapeHtml(visibleWinner.offer_angle || "untagged")}</span>
                  <span class="tag-chip">${escapeHtml(visibleWinner.messaging_theme || "unthemed")}</span>
                </div>
              </article>
            `;
          })
          .join("");

        return `
          <section class="analysis-section">
            <div class="analysis-head">
              <div>
                <h2>Current Winners</h2>
                <p>Single longest-running active ad for each competitor.</p>
              </div>
            </div>
            <div class="analysis-grid">${cards}</div>
          </section>
        `;
      }

      function renderSummary(payload) {
        latestPayload = payload;
        const competitors = payload.competitors || [];
        generatedAtEl.textContent = `Summary generated ${formatTimestamp(payload.generated_at)}`;

        if (competitors.length === 0) {
          renderEmpty(
            "No scrape data found yet. Run <code>npm run scrape</code>, then refresh this dashboard."
          );
          return;
        }

        const competitorMarkup = competitors
          .map((competitor) => {
            const winners = (competitor.winners || []).filter(matchesFilters);
            const emptyWinnerMessage = hasActiveFilters()
              ? "No ads match the current filters."
              : "No ads captured in the latest scrape.";
            const winnerMarkup =
              winners.length === 0
                ? `<article class="winner"><div class="copy empty-copy">${emptyWinnerMessage}</div></article>`
                : winners
                    .map((ad) => {
                      const statusClass = (ad.status || "").toLowerCase() === "active" ? "active" : "inactive";
                      const copy = truncate(ad.ad_copy_text || ad.ad_copy, 100);
                      const hasCopy = Boolean(copy);

                      return `
                        <article class="winner">
                          <div class="winner-head">
                            <span class="badge ${statusClass}">${escapeHtml(ad.status || "Unknown")}</span>
                            <span class="winner-id">Library ID ${escapeHtml(ad.library_id || "n/a")}</span>
                          </div>
                          <div class="days">${ad.run_days ?? "?"} days</div>
                          ${renderThumbnail(ad, `${competitor.competitor} ad thumbnail`)}
                          <div class="copy ${hasCopy ? "" : "empty-copy"}">${hasCopy ? escapeHtml(copy) : "No primary copy captured."}</div>
                          ${renderMetaLink(ad)}
                          <div class="winner-tags">
                            <span class="tag-chip">${escapeHtml(ad.offer_angle || "untagged")}</span>
                            <span class="tag-chip">${escapeHtml(ad.messaging_theme || "unthemed")}</span>
                          </div>
                          <div class="winner-foot">
                            <span class="detail">${escapeHtml((ad.format || "unknown").toUpperCase())}</span>
                            <span class="detail">${escapeHtml(formatDateRange(ad))}</span>
                          </div>
                        </article>
                      `;
                    })
                    .join("");

            return `
              <section class="competitor-card">
                <div class="competitor-top">
                  <div class="competitor-heading">
                    <h2>${escapeHtml(competitor.competitor)}</h2>
                    <p>Top 10 longest-running ads from the latest scrape.</p>
                  </div>
                  <div class="metric-row" aria-label="${escapeHtml(competitor.competitor)} summary">
                    <div class="metric-pill">
                      <strong>Dominant Format</strong>
                      ${escapeHtml(competitor.dominant_format || "unknown")}
                    </div>
                    <div class="metric-pill">
                      <strong>Total Ads</strong>
                      ${escapeHtml(competitor.ad_count ?? 0)}
                    </div>
                    <div class="metric-pill">
                      <strong>Last Scraped</strong>
                      ${escapeHtml(formatTimestamp(competitor.scraped_at))}
                    </div>
                    <div class="metric-pill">
                      <strong>Top Angle</strong>
                      ${escapeHtml(competitor.top_offer_angle || "unknown")}
                    </div>
                    <div class="metric-pill">
                      <strong>Top Theme</strong>
                      ${escapeHtml(competitor.top_messaging_theme || "unknown")}
                    </div>
                  </div>
                  <div class="group-stack">
                    <div>
                      <div class="group-label">Angle Mix</div>
                      <div class="tag-row">${renderTagChips(competitor.offer_angle_breakdown || [], "No angles tagged yet")}</div>
                    </div>
                    <div>
                      <div class="group-label">Recent Themes</div>
                      <div class="theme-row">${renderRecentThemes(competitor.recent_themes || [])}</div>
                    </div>
                  </div>
                </div>
                <div class="winner-list">${winnerMarkup}</div>
              </section>
            `;
          })
          .join("");

        appEl.innerHTML = `${renderFilterPanel(competitors)}${renderAnalysisSection(competitors)}${competitorMarkup}`;
        bindFilters();
      }

      async function loadSummary() {
        generatedAtEl.textContent = "Loading latest scrape summary…";

        try {
          const response = await fetch("/api/summary", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Request failed with ${response.status}`);
          }

          const payload = await response.json();
          renderSummary(payload);
        } catch (error) {
          generatedAtEl.textContent = "Summary unavailable";
          renderEmpty(`Unable to load dashboard data. ${error.message}`, "error");
        }
      }

      refreshButton.addEventListener("click", loadSummary);
      loadSummary();
    </script>
  </body>
</html>
